<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meme API Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111318;
  --panel: #191c24;
  --card: #1e2130;
  --border: #2a2d3e;
  --accent: #7c6af7;
  --accent-h: #9d8fff;
  --accent-dim: rgba(124,106,247,0.15);
  --green: #3dd68c;
  --red: #f76060;
  --text: #e8eaf0;
  --muted: #7a7f9a;
  --tag-bg: #252840;
  --hh: 52px;
  --nh: 52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:14px}

/* HEADER */
.header{
  position:fixed;top:0;left:0;right:0;height:var(--hh);
  background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;
}
.logo{font-weight:700;font-size:15px;color:var(--accent-h);white-space:nowrap;margin-right:2px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:.3s}
.dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.err{background:var(--red)}
.url-input{
  flex:1;min-width:0;background:var(--card);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:11px;padding:7px 8px;outline:none;
}
.url-input:focus{border-color:var(--accent)}
.btn-connect{
  background:var(--accent);color:#fff;border:none;border-radius:6px;
  padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nh);
  background:var(--panel);border-top:1px solid var(--border);
  display:flex;z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;cursor:pointer;color:var(--muted);font-size:10px;
  border:none;background:none;padding:4px 0;
}
.nav-icon{font-size:20px;line-height:1}
.nav-btn.active{color:var(--accent-h)}

/* PAGES */
.page{
  position:fixed;top:var(--hh);bottom:var(--nh);left:0;right:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;
}
.page.active{display:block}

/* ── PAGE LIST ── */
.search-bar{
  position:sticky;top:0;z-index:10;
  background:var(--panel);border-bottom:1px solid var(--border);
  padding:10px 12px;
}
.search-input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;
  padding:9px 12px;outline:none;font-family:inherit;
}
.search-input:focus{border-color:var(--accent)}
.count-bar{font-size:11px;color:var(--muted);margin-top:6px;padding:0 2px}
.meme-list{padding-bottom:8px}
.meme-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;cursor:pointer;
  border-bottom:1px solid var(--border);
}
.meme-item:active{background:var(--card)}
.meme-item.active{background:var(--accent-dim)}
.meme-key{font-family:'JetBrains Mono',monospace;font-size:13px;flex:1}
.meme-item.active .meme-key{color:var(--accent-h)}
.meme-arrow{color:var(--border);font-size:14px}

/* ── PAGE FORM ── */
.form-page-inner{
  display:flex;flex-direction:column;gap:14px;
  padding:14px 12px 24px;
}
.key-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;
}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:0 2px}
.key-name{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent-h);flex:1;word-break:break-all}
.info-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}

.sec-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.field-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}

.texts-list{display:flex;flex-direction:column;gap:8px}
.text-row{display:flex;gap:6px;align-items:center}
.text-row input{
  flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:15px;
  padding:9px 10px;outline:none;font-family:inherit;
}
.text-row input:focus{border-color:var(--accent)}
.rm-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;width:34px;height:34px;cursor:pointer;font-size:17px;flex-shrink:0;
}

.add-btn{
  width:100%;background:none;border:1.5px dashed var(--border);border-radius:8px;
  color:var(--muted);font-size:13px;cursor:pointer;padding:10px;
  margin-top:8px;font-family:inherit;
}
.add-btn:active{border-color:var(--accent);color:var(--accent)}

.img-slot{
  border:1.5px dashed var(--border);border-radius:8px;padding:14px;
  text-align:center;cursor:pointer;position:relative;background:var(--bg);
  margin-bottom:8px;
}
.img-slot.filled{border-style:solid;border-color:var(--accent)}
.img-slot input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.slot-preview{width:100%;max-height:100px;object-fit:contain;border-radius:6px;display:none}
.slot-label{font-size:13px;color:var(--muted)}
.slot-name{font-size:11px;color:var(--accent-h);font-family:'JetBrains Mono',monospace;margin-top:4px;word-break:break-all}
.rm-img-btn{
  position:absolute;top:6px;right:6px;
  background:var(--red);color:#fff;border:none;
  border-radius:4px;font-size:11px;padding:3px 8px;cursor:pointer;z-index:2;display:none;
}

.args-ta{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:12px;padding:9px 10px;outline:none;resize:vertical;min-height:80px;line-height:1.6;
}
.args-ta:focus{border-color:var(--accent)}
.hint{font-size:11px;color:var(--muted);margin-top:6px}

.send-btn{
  width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:15px;font-size:16px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;
}
.send-btn:active{opacity:.85}
.send-btn:disabled{opacity:.5}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.send-btn.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PAGE RESULT ── */
.result-inner{
  display:flex;flex-direction:column;gap:12px;align-items:center;
  padding:14px 12px 24px;
}
.status-row{width:100%;display:flex;align-items:center;gap:8px}
.status-badge{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:3px 10px;border-radius:5px}
.ok-badge{background:#1a3a2a;color:var(--green)}
.err-badge{background:#3a1a1a;color:var(--red)}
.elapsed{font-size:12px;color:var(--muted);margin-left:auto}
.result-img{max-width:100%;border-radius:10px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.act-row{display:flex;gap:8px;width:100%}
.act-btn{
  flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:11px;font-size:13px;cursor:pointer;font-family:inherit;
}
.act-btn:active{border-color:var(--accent)}
.result-json{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;
  line-height:1.7;white-space:pre-wrap;word-break:break-word;
}
.empty-state{
  color:var(--muted);text-align:center;
  padding:80px 20px;font-size:13px;line-height:2;
}
.empty-icon{font-size:48px;margin-bottom:12px}

/* ── PAGE INFO ── */
.info-inner{display:flex;flex-direction:column;gap:12px;padding:14px 12px 24px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:13px;line-height:1.9}
.info-row{display:flex;gap:8px}
.info-label{color:var(--muted);min-width:65px;flex-shrink:0}
.tag{display:inline-block;background:var(--tag-bg);color:var(--accent-h);border-radius:4px;padding:1px 6px;font-family:'JetBrains Mono',monospace;font-size:11px;margin:1px}
.preview-img{width:100%;border-radius:10px;border:1px solid var(--border)}
.raw-json{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* JSON colors */
.jk{color:#9d8fff}.js{color:#7ec67f}.jn{color:#f5a742}.jb{color:#f07070}.jnu{color:var(--muted);font-style:italic}

/* TOAST */
#toast{
  position:fixed;bottom:calc(var(--nh) + 10px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:8px 16px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:999;
  white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── DESKTOP ── */
@media(min-width:700px){
  :root{--nh:0px}
  .bottom-nav{display:none}
  /* 3-col: list 240 | form 380 | result rest */
  .page{top:var(--hh);bottom:0}
  #page-list{left:0;width:240px;border-right:1px solid var(--border);display:block !important}
  #page-form{left:240px;width:380px;border-right:1px solid var(--border);display:block !important}
  #page-result{left:620px;right:0;display:block !important}
  #page-info{display:none !important}
  .back-btn{display:none}
  .info-btn{display:none}
  #toast{bottom:12px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎭</div>
  <div class="dot" id="dot"></div>
  <input class="url-input" id="baseUrl" value="https://liubs1135gg-meme-api.hf.space" placeholder="Base URL">
  <button class="btn-connect" onclick="connect()">连接</button>
</div>

<!-- LIST -->
<div class="page active" id="page-list">
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="🔍  搜索 meme key..." oninput="filterList()">
    <div class="count-bar" id="countBar">点击右上角「连接」加载</div>
  </div>
  <div class="meme-list" id="memeList">
    <div style="color:var(--muted);text-align:center;padding:60px 20px;font-size:13px;line-height:2">点击右上角「连接」<br>加载表情列表</div>
  </div>
</div>

<!-- FORM -->
<div class="page" id="page-form">
  <div class="form-page-inner">
    <div class="key-bar">
      <button class="back-btn" onclick="goPage('list')">‹</button>
      <div class="key-name" id="formKeyName">—</div>
      <button class="info-btn" onclick="goPage('info')">ℹ 详情</button>
    </div>
    <div id="formBody"></div>
  </div>
</div>

<!-- RESULT -->
<div class="page" id="page-result">
  <div class="result-inner" id="resultInner">
    <div class="empty-state">
      <div class="empty-icon">🖼️</div>
      发送请求后<br>表情包将显示在这里
    </div>
  </div>
</div>

<!-- INFO -->
<div class="page" id="page-info">
  <div class="info-inner">
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="goPage('form')" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1">‹</button>
      <div style="font-weight:600;font-size:15px">接口信息</div>
    </div>
    <div id="infoContent" style="color:var(--muted);text-align:center;padding:40px 0;font-size:13px">请先选择一个 meme</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-list" onclick="goPage('list')">
    <span class="nav-icon">☰</span>列表
  </button>
  <button class="nav-btn" id="nav-form" onclick="goPage('form')">
    <span class="nav-icon">✏️</span>参数
  </button>
  <button class="nav-btn" id="nav-result" onclick="goPage('result')">
    <span class="nav-icon">🖼️</span>结果
  </button>
  <button class="nav-btn" id="nav-info" onclick="goPage('info')">
    <span class="nav-icon">ℹ️</span>信息
  </button>
</div>

<div id="toast"></div>

<script>
const BASE_URL = () => document.getElementById('baseUrl').value.replace(/\/$/, '');
let currentKey = null;
let imageFiles = [];
let liveResultUrl = null;
let allKeys = [];
const infoCache = {};
const PAGES = ['list','form','result','info'];

function goPage(name) {
  PAGES.forEach(p => {
    document.getElementById('page-' + p).classList.toggle('active', p === name);
    const nb = document.getElementById('nav-' + p);
    if (nb) nb.classList.toggle('active', p === name);
  });
}

// ── CONNECT (直接请求 /memes/keys，不依赖 /meme/version) ──────────
async function connect() {
  const dot = document.getElementById('dot');
  dot.className = 'dot';
  document.getElementById('memeList').innerHTML =
    '<div style="color:var(--muted);text-align:center;padding:60px 20px;font-size:13px">连接中...</div>';
  document.getElementById('countBar').textContent = '加载中...';

  const url = `${BASE_URL()}/memes/keys`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`服务器返回 HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('响应格式异常');
    allKeys = data.sort();
    dot.className = 'dot ok';
    buildList(allKeys);
    toast(`✓ 已连接，共 ${allKeys.length} 个 meme`);
  } catch(e) {
    dot.className = 'dot err';
    document.getElementById('memeList').innerHTML =
      `<div style="color:var(--red);text-align:center;padding:60px 16px;font-size:13px;line-height:2">
        连接失败<br>
        <span style="font-size:12px;color:var(--muted)">${e.message}</span><br>
        <span style="font-size:11px;color:var(--muted)">请检查 URL 或网络</span>
      </div>`;
    document.getElementById('countBar').textContent = '连接失败';
    toast('✗ ' + e.message);
  }
}

// ── LIST ──────────────────────────────────────────────────────────
function buildList(keys) {
  const list = document.getElementById('memeList');
  const frag = document.createDocumentFragment();
  for (const key of keys) {
    const item = document.createElement('div');
    item.className = 'meme-item';
    item.dataset.key = key;
    item.innerHTML = `<div class="meme-key">${key}</div><div class="meme-arrow">›</div>`;
    item.onclick = () => selectMeme(key, item);
    frag.appendChild(item);
  }
  list.innerHTML = '';
  list.appendChild(frag);
  document.getElementById('countBar').textContent = `共 ${keys.length} 个 meme`;
}

function filterList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let count = 0;
  document.querySelectorAll('.meme-item').forEach(el => {
    const show = el.dataset.key.includes(q);
    el.style.display = show ? '' : 'none';
    if (show) count++;
  });
  document.getElementById('countBar').textContent =
    q ? `${count} / ${allKeys.length} 个 meme` : `共 ${allKeys.length} 个 meme`;
}

// ── SELECT ────────────────────────────────────────────────────────
function selectMeme(key, itemEl) {
  document.querySelectorAll('.meme-item').forEach(i => i.classList.remove('active'));
  itemEl.classList.add('active');
  currentKey = key;
  imageFiles = [null];
  document.getElementById('formKeyName').textContent = key;
  renderForm();
  loadFormData(key);
  renderInfoPage(key);
  goPage('form');
}

// ── FORM ──────────────────────────────────────────────────────────
function renderForm() {
  document.getElementById('formBody').innerHTML = `
    <div style="margin-bottom:14px">
      <div class="sec-label">文字参数</div>
      <div class="field-card">
        <div class="texts-list" id="textsList">
          <div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">加载中...</div>
        </div>
        <button class="add-btn" onclick="addTextRow()">＋ 添加文字</button>
      </div>
    </div>

    <div style="margin-bottom:14px">
      <div class="sec-label">图片参数</div>
      <div class="field-card">
        <div id="imagesGrid"></div>
        <button class="add-btn" onclick="addImageSlot()">＋ 添加图片槽</button>
      </div>
    </div>

    <div style="margin-bottom:14px">
      <div class="sec-label">额外参数 (args JSON)</div>
      <div class="field-card">
        <textarea class="args-ta" id="argsInput" placeholder="加载中..."></textarea>
        <div class="hint">整体作为 JSON 字符串提交到 args 字段</div>
      </div>
    </div>

    <button class="send-btn" id="sendBtn" onclick="sendMeme()">
      <div class="spinner"></div>
      ▶ 发送请求
    </button>
  `;
  renderImageSlots();
}

async function loadFormData(key) {
  const info = await fetchInfo(key);
  const list = document.getElementById('textsList');
  if (!list) return;
  list.innerHTML = '';
  const defaults = info?.params?.args?.default?.texts || [];
  if (defaults.length > 0) defaults.forEach(t => addTextRow(t));
  else addTextRow('');

  const argsEl = document.getElementById('argsInput');
  if (argsEl) {
    const argObj = { ...(info?.params?.args?.default || { user_infos: [] }) };
    delete argObj.texts; delete argObj.images;
    try { argsEl.value = JSON.stringify(argObj, null, 2); }
    catch { argsEl.value = '{"user_infos": []}'; }
  }
}

function addTextRow(val = '') {
  const list = document.getElementById('textsList');
  if (!list) return;
  const row = document.createElement('div');
  row.className = 'text-row';
  row.innerHTML = `
    <input type="text" value="${escHtml(val)}" placeholder="输入文字">
    <button class="rm-btn" onclick="this.parentElement.remove()">×</button>
  `;
  list.appendChild(row);
}

function renderImageSlots() {
  const grid = document.getElementById('imagesGrid');
  if (!grid) return;
  grid.innerHTML = '';
  imageFiles.forEach((_, i) => createSlot(grid, i));
}

function createSlot(grid, idx) {
  const s = document.createElement('div');
  s.className = 'img-slot'; s.id = `slot_${idx}`;
  s.innerHTML = `
    <input type="file" accept="image/*" onchange="handleFile(this,${idx})">
    <img class="slot-preview" id="prev_${idx}">
    <div class="slot-label">点击上传图片 ${idx + 1}</div>
    <div class="slot-name" id="sname_${idx}"></div>
    <button class="rm-img-btn" id="rmbtn_${idx}" onclick="clearSlot(${idx},event)">✕ 移除</button>
  `;
  ['dragover','dragenter'].forEach(ev => s.addEventListener(ev, e => { e.preventDefault(); s.style.borderColor='var(--accent)'; }));
  ['dragleave','dragend'].forEach(ev => s.addEventListener(ev, () => { s.style.borderColor=''; }));
  s.addEventListener('drop', e => { e.preventDefault(); s.style.borderColor=''; if(e.dataTransfer.files[0]) setFile(idx,e.dataTransfer.files[0]); });
  grid.appendChild(s);
}

function addImageSlot() {
  imageFiles.push(null);
  const grid = document.getElementById('imagesGrid');
  if (grid) createSlot(grid, imageFiles.length - 1);
}

function handleFile(input, idx) { if(input.files[0]) setFile(idx, input.files[0]); }

function setFile(idx, file) {
  imageFiles[idx] = file;
  const prev = document.getElementById(`prev_${idx}`);
  const sname = document.getElementById(`sname_${idx}`);
  const slot = document.getElementById(`slot_${idx}`);
  const rmbtn = document.getElementById(`rmbtn_${idx}`);
  if(prev) { prev.src = URL.createObjectURL(file); prev.style.display = 'block'; }
  if(sname) sname.textContent = '📎 ' + file.name;
  if(slot) slot.classList.add('filled');
  if(rmbtn) rmbtn.style.display = 'block';
}

function clearSlot(idx, e) {
  e.stopPropagation();
  imageFiles[idx] = null;
  const slot = document.getElementById(`slot_${idx}`);
  const prev = document.getElementById(`prev_${idx}`);
  const sname = document.getElementById(`sname_${idx}`);
  const rmbtn = document.getElementById(`rmbtn_${idx}`);
  const input = slot?.querySelector('input[type=file]');
  if(prev) { prev.style.display='none'; prev.src=''; }
  if(sname) sname.textContent = '';
  if(slot) slot.classList.remove('filled');
  if(rmbtn) rmbtn.style.display = 'none';
  if(input) input.value = '';
}

// ── SEND ──────────────────────────────────────────────────────────
async function sendMeme() {
  if (!currentKey) return;
  const btn = document.getElementById('sendBtn');
  btn.classList.add('loading'); btn.disabled = true;

  const fd = new FormData();
  document.querySelectorAll('.text-row input').forEach(inp => fd.append('texts', inp.value));
  imageFiles.forEach(f => { if(f) fd.append('images', f); });
  const argsEl = document.getElementById('argsInput');
  if (argsEl?.value.trim()) {
    try { fd.append('args', JSON.stringify(JSON.parse(argsEl.value))); }
    catch { fd.append('args', argsEl.value); }
  }

  const t0 = performance.now();
  try {
    const res = await fetch(`${BASE_URL()}/memes/${currentKey}/`, { method: 'POST', body: fd });
    const elapsed = Math.round(performance.now() - t0);
    const ct = res.headers.get('content-type') || '';
    const inner = document.getElementById('resultInner');

    const badgeCls = res.ok ? 'ok-badge' : 'err-badge';
    let html = `<div class="status-row">
      <span class="status-badge ${badgeCls}">${res.status} ${res.statusText}</span>
      <span class="elapsed">${elapsed}ms</span>
    </div>`;

    if (ct.includes('image') || ct.includes('gif') || ct.includes('octet')) {
      const blob = await res.blob();
      if (liveResultUrl) URL.revokeObjectURL(liveResultUrl);
      liveResultUrl = URL.createObjectURL(blob);
      html += `
        <div class="act-row">
          <button class="act-btn" onclick="dlResult()">⬇ 下载</button>
          <button class="act-btn" onclick="copyApiUrl()">🔗 复制 URL</button>
        </div>
        <img class="result-img" src="${liveResultUrl}">`;
    } else {
      const text = await res.text();
      let disp = text;
      try { disp = syntaxHL(JSON.stringify(JSON.parse(text), null, 2)); } catch {}
      html += `<div class="result-json">${disp}</div>`;
    }
    inner.innerHTML = html;
    goPage('result');
  } catch(e) {
    document.getElementById('resultInner').innerHTML =
      `<div class="result-json" style="color:var(--red);width:100%">请求失败：${e.message}</div>`;
    goPage('result');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function dlResult() {
  if (!liveResultUrl) return;
  const a = document.createElement('a');
  a.href = liveResultUrl; a.download = currentKey + '.gif'; a.click();
}
function copyApiUrl() {
  navigator.clipboard.writeText(`${BASE_URL()}/memes/${currentKey}/`)
    .then(() => toast('✓ 已复制接口 URL'));
}

// ── INFO ──────────────────────────────────────────────────────────
function renderInfoPage(key) {
  const el = document.getElementById('infoContent');
  el.innerHTML = `
    <div class="info-card" id="infoCard">
      <div class="info-row"><span class="info-label">Key</span>
        <span style="font-family:'JetBrains Mono',monospace;color:var(--accent-h)">${key}</span></div>
      <div class="info-row"><span class="info-label">端点</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">POST /memes/${key}/</span></div>
      <div class="info-row"><span class="info-label">详情</span>
        <span style="color:var(--muted);font-size:12px">加载中...</span></div>
    </div>
    <div>
      <div class="sec-label" style="margin-bottom:8px">快速预览</div>
      <img class="preview-img" onerror="this.style.display='none'" src="${BASE_URL()}/memes/${key}/preview">
    </div>
    <div id="infoRaw"></div>
  `;
  el.style.cssText = '';

  fetchInfo(key).then(info => {
    if (!info) return;
    const argDef = info?.params?.args?.default || {};
    const texts = argDef.texts || [];
    const argKeys = Object.keys(argDef).filter(k => !['user_infos','texts','images'].includes(k));
    const minImg = info?.params?.min_images ?? 0;
    const maxImg = info?.params?.max_images ?? '不限';
    const minTxt = info?.params?.min_texts ?? 0;
    const maxTxt = info?.params?.max_texts ?? '不限';
    document.getElementById('infoCard').innerHTML = `
      <div class="info-row"><span class="info-label">Key</span>
        <span style="font-family:'JetBrains Mono',monospace;color:var(--accent-h)">${key}</span></div>
      <div class="info-row"><span class="info-label">端点</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">POST /memes/${key}/</span></div>
      <div class="info-row"><span class="info-label">图片数</span><span>${minImg} ~ ${maxImg}</span></div>
      <div class="info-row"><span class="info-label">文字数</span><span>${minTxt} ~ ${maxTxt}</span></div>
      <div class="info-row"><span class="info-label">预设文字</span>
        <span>${texts.length ? texts.map(t=>`<span class="tag">${escHtml(String(t).slice(0,20))}</span>`).join('') : '<span style="color:var(--muted)">无</span>'}</span></div>
      <div class="info-row"><span class="info-label">额外参数</span>
        <span>${argKeys.length ? argKeys.map(k=>`<span class="tag">${k}</span>`).join('') : '<span style="color:var(--muted)">无</span>'}</span></div>
    `;
    document.getElementById('infoRaw').innerHTML = `
      <div class="sec-label" style="margin-bottom:8px">完整响应</div>
      <div class="raw-json">${syntaxHL(JSON.stringify(info,null,2))}</div>
    `;
  });
}

// ── FETCH INFO (lazy + cache) ─────────────────────────────────────
async function fetchInfo(key) {
  if (infoCache[key]) return infoCache[key];
  try {
    const res = await fetch(`${BASE_URL()}/memes/${key}/info`);
    if (!res.ok) throw new Error();
    infoCache[key] = await res.json();
    return infoCache[key];
  } catch { return null; }
}

// ── UTILS ─────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function syntaxHL(str) {
  return escHtml(str).replace(
    /("(?:\\.|[^"\\])*"(?:\s*:)?|\b(?:true|false)\b|\bnull\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
    m => {
      if(/^".*":$/.test(m.trim())) return `<span class="jk">${m}</span>`;
      if(/^"/.test(m)) return `<span class="js">${m}</span>`;
      if(/^-?\d/.test(m)) return `<span class="jn">${m}</span>`;
      if(m==='true'||m==='false') return `<span class="jb">${m}</span>`;
      if(m==='null') return `<span class="jnu">${m}</span>`;
      return m;
    }
  );
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
